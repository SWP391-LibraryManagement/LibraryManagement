openapi: 3.0.3
info:
  title: Library Management System API — FE05/FE07/FE08/FE10/FE11/FE12
  version: 1.0.0
  description: >
    API documentation for FE05 Book Management, FE07 Borrowing, FE08 Reservation, FE10 Notification,
    FE11 Admin Audit Logs and Permissions, and FE12 Reporting.
    All endpoints require a Bearer JWT obtained from /api/auth/login.
servers:
  - url: /
    description: Same-origin server
tags:
  - name: Book Management
    description: FE05 — public catalog reads and librarian/admin catalog mutations
  - name: Borrowing
    description: FE07 — borrow requests, approval, return, renewal
  - name: Reservation
    description: FE08 — reservation queue, hold, expire
  - name: Notification
    description: FE10 — notification requests and delivery
  - name: Fine Management
    description: FE09 — overdue fine calculation and resolution
  - name: Reporting
    description: FE12 — read-only aggregate reports
  - name: Admin Audit
    description: FE11 — Admin-only searchable and redacted audit log view
  - name: Admin Permissions
    description: FE11 — Admin-only canonical read-only permission policy
  - name: Admin Requests
    description: FE11 — Admin-only canonical FE07 request list and detail views
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SafeError' }
    Forbidden:
      description: Authenticated but role not allowed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SafeError' }
    ValidationError:
      description: Invalid input
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SafeValidationError' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SafeError' }
    Conflict:
      description: Business-rule conflict (e.g. duplicate, not available, terminal state)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SafeError' }
    BorrowRequestCreatedResponse:
      description: Borrow request created
      content:
        application/json:
          schema: { $ref: '#/components/schemas/BorrowRequestCreatedPayload' }
    BorrowRequestListResponse:
      description: Borrow request list
      content:
        application/json:
          schema: { $ref: '#/components/schemas/BorrowRequestListPayload' }
    MemberBorrowingsResponse:
      description: Selected member borrowing details
      content:
        application/json:
          schema: { $ref: '#/components/schemas/MemberBorrowingsPayload' }
    BorrowRequestResponse:
      description: Updated borrow request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/BorrowRequestPayload' }
    BorrowDetailReturnResponse:
      description: Returned borrow detail and fine-review data
      content:
        application/json:
          schema: { $ref: '#/components/schemas/BorrowDetailReturnPayload' }
    BorrowDetailResponse:
      description: Updated borrow detail
      content:
        application/json:
          schema: { $ref: '#/components/schemas/BorrowDetailPayload' }
    BorrowingReportResponse:
      description: Aggregated borrowing statistics
      content:
        application/json:
          schema: { $ref: '#/components/schemas/BorrowingReport' }
    InventoryReportResponse:
      description: Aggregated inventory statistics
      content:
        application/json:
          schema: { $ref: '#/components/schemas/InventoryReport' }
    UserStatisticsReportResponse:
      description: Aggregated user statistics
      content:
        application/json:
          schema: { $ref: '#/components/schemas/UserStatisticsReport' }
  schemas:
    NotificationSummary:
      type: object
      additionalProperties: false
      required: [notificationId, status]
      properties:
        notificationId: { type: integer }
        status: { type: string, enum: [PENDING, PROCESSING, SENT, DELIVERED, FAILED, SKIPPED, CANCELLED] }
    SensitiveOtpNotificationRequest:
      type: object
      additionalProperties: false
      description: Internal-only FE02 requester contract; this schema is never accepted by staff HTTP.
      required: [type, channel, recipientEmail, templateKey, templateData, sourceEntityType, sourceEntityId, idempotencyKey]
      properties:
        type: { type: string, enum: [ACCOUNT_VERIFICATION, PASSWORD_RESET] }
        channel: { type: string, enum: [EMAIL] }
        userId: { type: integer, minimum: 1 }
        recipientEmail: { type: string, format: email }
        templateKey: { type: string, enum: [ACCOUNT_VERIFICATION, PASSWORD_RESET] }
        templateData:
          type: object
          additionalProperties: false
          required: [otp, expiresInMinutes]
          properties:
            otp:
              type: string
              pattern: '^\d{6}$'
              writeOnly: true
            expiresInMinutes: { type: integer, minimum: 1 }
        sourceEntityType: { type: string, enum: [AuthToken] }
        sourceEntityId: { type: integer, minimum: 1 }
        idempotencyKey:
          type: string
          pattern: '^FE02:(ACCOUNT_VERIFICATION|PASSWORD_RESET):[1-9]\d*$'
    ProcessPendingSummary:
      type: object
      additionalProperties: false
      required: [processed, failed]
      properties:
        processed: { type: integer, minimum: 0 }
        failed: { type: integer, minimum: 0 }
    SafeValidationError:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code: { type: string, example: VALIDATION_ERROR }
            message: { type: string, example: Invalid request. }
            details:
              type: array
              items:
                type: object
                additionalProperties: false
                required: [field, message]
                properties:
                  field: { type: string }
                  message: { type: string }
    SafeError:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code: { type: string, example: ROLE_REQUIRED }
            message: { type: string, example: Access is denied. }
    ReservationCandidate:
      type: object
      additionalProperties: false
      required: [copyId, bookId, title, authorName, copyStatus, activeReservationCount]
      properties:
        copyId: { type: integer, minimum: 1 }
        bookId: { type: integer, minimum: 1 }
        title: { type: string }
        authorName: { type: string, nullable: true }
        copyStatus: { type: string, enum: [BORROWED, RESERVED] }
        activeReservationCount: { type: integer, minimum: 0 }
    ReservationCandidatePagination:
      type: object
      additionalProperties: false
      required: [page, limit, total, totalPages]
      properties:
        page: { type: integer, minimum: 1 }
        limit: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    ReservationCandidateListResponse:
      type: object
      additionalProperties: false
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/ReservationCandidate' }
        pagination: { $ref: '#/components/schemas/ReservationCandidatePagination' }
    AdminPermissionRole:
      type: object
      additionalProperties: false
      required: [roleName, label]
      properties:
        roleName: { type: string, enum: [ADMIN, LIBRARIAN, MEMBER] }
        label: { type: string }
    AdminPermissionRule:
      type: object
      additionalProperties: false
      required: [permissionKey, label, moduleKey, moduleLabel, allowedRoles]
      properties:
        permissionKey: { type: string }
        label: { type: string }
        moduleKey: { type: string }
        moduleLabel: { type: string }
        allowedRoles:
          type: array
          minItems: 1
          uniqueItems: true
          items: { type: string, enum: [ADMIN, LIBRARIAN, MEMBER] }
    AdminPermissionsResponse:
      type: object
      additionalProperties: false
      required: [roles, permissions]
      properties:
        roles:
          type: array
          minItems: 3
          maxItems: 3
          items: { $ref: '#/components/schemas/AdminPermissionRole' }
        permissions:
          type: array
          minItems: 15
          maxItems: 15
          items: { $ref: '#/components/schemas/AdminPermissionRule' }
    AuditLogActor:
      type: object
      additionalProperties: false
      required: [userId, email, fullName]
      properties:
        userId: { type: integer, nullable: true, minimum: 1 }
        email: { type: string, nullable: true, format: email }
        fullName: { type: string, nullable: true }
    AuditLogTarget:
      type: object
      additionalProperties: false
      required: [type, id, label]
      properties:
        type: { type: string, nullable: true }
        id: { type: integer, nullable: true, minimum: 1 }
        label: { type: string, nullable: true }
    AuditLogDetails:
      type: object
      additionalProperties: false
      properties:
        roleId: { type: integer, minimum: 1 }
        roleName: { type: string }
        changedFields: { type: array, maxItems: 100, items: { type: string } }
        newStatus: { type: string }
        previousStatus: { type: string }
        copyIds: { type: array, maxItems: 100, items: { type: integer, minimum: 1 } }
        memberUserId: { type: integer, minimum: 1 }
        requestId: { type: integer, minimum: 1 }
        memberId: { type: integer, minimum: 1 }
        copyId: { type: integer, minimum: 1 }
        selectedUserId: { type: integer, minimum: 1 }
        borrowDetailId: { type: integer, minimum: 1 }
        userId: { type: integer, minimum: 1 }
        bookId: { type: integer, minimum: 1 }
        sourceEntityId: { type: integer, minimum: 1 }
        condition: { type: string }
        barcode: { type: string }
        location: { type: string }
        status: { type: string }
        code: { type: string }
        method: { type: string }
        reportType: { type: string, enum: [BORROWING, INVENTORY, USERS] }
        type: { type: string }
        channel: { type: string }
        sourceFeature: { type: string }
        sourceEntityType: { type: string }
        newDueDate: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        overdueDays: { type: number, minimum: 0 }
        amount: { type: number, minimum: 0 }
        collectedAmount: { type: number, minimum: 0 }
        statusCode: { type: integer, minimum: 0 }
        processed: { type: integer, minimum: 0 }
        failed: { type: integer, minimum: 0 }
        fullyCollected: { type: boolean }
        reasonProvided: { type: boolean }
        notesProvided: { type: boolean }
        noteProvided: { type: boolean }
    AuditLogEntry:
      type: object
      additionalProperties: false
      required: [logId, action, actor, target, details, ipAddress, createdAt]
      properties:
        logId: { type: integer, minimum: 1 }
        action: { type: string }
        actor: { $ref: '#/components/schemas/AuditLogActor' }
        target: { $ref: '#/components/schemas/AuditLogTarget' }
        details: { $ref: '#/components/schemas/AuditLogDetails' }
        ipAddress: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    AuditLogPagination:
      type: object
      additionalProperties: false
      required: [page, limit, total, totalPages]
      properties:
        page: { type: integer, minimum: 1 }
        limit: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    AuditLogListResponse:
      type: object
      additionalProperties: false
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AuditLogEntry' }
        pagination: { $ref: '#/components/schemas/AuditLogPagination' }
    AdminRequestMemberSummary:
      type: object
      additionalProperties: false
      required: [userId, fullName, email, phoneNumber]
      properties:
        userId: { type: integer, minimum: 1 }
        fullName: { type: string, nullable: true }
        email: { type: string, format: email }
        phoneNumber: { type: string, nullable: true }
    AdminRequestListItem:
      type: object
      additionalProperties: false
      required: [requestId, requestDate, status, member, itemCount, bookTitles, categories]
      properties:
        requestId: { type: integer, minimum: 1 }
        requestDate: { type: string, format: date-time }
        status: { type: string, enum: [PENDING, APPROVED, REJECTED, COMPLETED, CANCELLED] }
        member: { $ref: '#/components/schemas/AdminRequestMemberSummary' }
        itemCount: { type: integer, minimum: 0 }
        bookTitles:
          type: array
          items: { type: string }
        categories:
          type: array
          uniqueItems: true
          items: { type: string }
    AdminRequestListResponse:
      type: object
      additionalProperties: false
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AdminRequestListItem' }
        pagination: { $ref: '#/components/schemas/AuditLogPagination' }
    AdminRequestDetailMember:
      type: object
      additionalProperties: false
      required: [userId, memberId, fullName, email, phoneNumber, status]
      properties:
        userId: { type: integer, minimum: 1 }
        memberId: { type: integer, nullable: true, minimum: 1 }
        fullName: { type: string, nullable: true }
        email: { type: string, format: email }
        phoneNumber: { type: string, nullable: true }
        status: { type: string, enum: [ACTIVE, INACTIVE, LOCKED] }
    AdminRequestDetailItem:
      type: object
      additionalProperties: false
      required: [borrowDetailId, copyId, barcode, title, author, location, status]
      properties:
        borrowDetailId: { type: integer, minimum: 1 }
        copyId: { type: integer, minimum: 1 }
        barcode: { type: string, nullable: true }
        title: { type: string, nullable: true }
        author: { type: string, nullable: true }
        location: { type: string, nullable: true }
        status: { type: string, enum: [REQUESTED, BORROWED, RETURNED, LOST, DAMAGED] }
    AdminRequestLifecycle:
      type: object
      additionalProperties: false
      required: [approvedAt, rejectedAt, processedAt]
      properties:
        approvedAt: { type: string, format: date-time, nullable: true }
        rejectedAt: { type: string, format: date-time, nullable: true }
        processedAt: { type: string, format: date-time, nullable: true }
    AdminRequestDetail:
      type: object
      additionalProperties: false
      required: [requestId, requestDate, status, createdAt, updatedAt, member, items, lifecycle]
      properties:
        requestId: { type: integer, minimum: 1 }
        requestDate: { type: string, format: date-time }
        status: { type: string, enum: [PENDING, APPROVED, REJECTED, COMPLETED, CANCELLED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }
        member: { $ref: '#/components/schemas/AdminRequestDetailMember' }
        items:
          type: array
          items: { $ref: '#/components/schemas/AdminRequestDetailItem' }
        lifecycle: { $ref: '#/components/schemas/AdminRequestLifecycle' }
    BorrowRequestCreateInput:
      type: object
      additionalProperties: false
      required: [copyIds]
      properties:
        copyIds:
          type: array
          minItems: 1
          uniqueItems: true
          items: { type: integer, minimum: 1 }
    BorrowRequestApproveInput:
      type: object
      additionalProperties: false
      properties:
        notes: { type: string, maxLength: 500 }
    BorrowRequestRejectInput:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason: { type: string, minLength: 1, maxLength: 500 }
    BorrowDetailReturnInput:
      type: object
      additionalProperties: false
      required: [condition]
      properties:
        condition: { type: string, enum: [NORMAL, DAMAGED, LOST] }
        returnDate:
          type: string
          format: date
          description: Optional; omitted values default to the current Asia/Ho_Chi_Minh business date. Future and pre-borrow dates are rejected.
        notes: { type: string, maxLength: 500 }
    BorrowDetailRenewInput:
      type: object
      additionalProperties: false
      properties:
        notes: { type: string, maxLength: 500 }
    BorrowRequest:
      type: object
      required: [requestId, userId, requestDate, status, createdBy, details]
      properties:
        requestId: { type: integer, minimum: 1 }
        userId: { type: integer, minimum: 1 }
        requestDate: { type: string, format: date-time }
        status: { type: string, enum: [PENDING, APPROVED, REJECTED, COMPLETED, CANCELLED] }
        createdBy: { type: integer, minimum: 1 }
        approvedBy: { type: integer, minimum: 1, nullable: true }
        approvedAt: { type: string, format: date-time, nullable: true }
        details:
          type: array
          items: { $ref: '#/components/schemas/BorrowDetail' }
    BorrowDetail:
      type: object
      required: [borrowDetailId, requestId, copyId, status, requestStatus, renewalCount]
      properties:
        borrowDetailId: { type: integer, minimum: 1 }
        requestId: { type: integer, minimum: 1 }
        copyId: { type: integer, minimum: 1 }
        borrowDate: { type: string, format: date, nullable: true }
        dueDate: { type: string, format: date, nullable: true }
        returnDate: { type: string, format: date, nullable: true }
        renewalCount: { type: integer, minimum: 0, maximum: 1 }
        requestStatus: { type: string, enum: [PENDING, APPROVED, REJECTED, COMPLETED, CANCELLED] }
        status:
          type: string
          enum: [REQUESTED, BORROWED, RETURNED, LOST, DAMAGED]
          description: OVERDUE is derived for reporting when status is BORROWED and dueDate is before today.
    FineCandidate:
      type: object
      required: [userId, borrowDetailId, copyId, condition, overdueDays, needsFineReview]
      properties:
        userId: { type: integer, minimum: 1 }
        borrowDetailId: { type: integer, minimum: 1 }
        copyId: { type: integer, minimum: 1 }
        condition: { type: string, enum: [NORMAL, DAMAGED, LOST] }
        overdueDays: { type: integer, minimum: 0 }
        needsFineReview: { type: boolean }
    BorrowRequestCreatedPayload:
      type: object
      required: [borrowRequest]
      properties:
        borrowRequest: { $ref: '#/components/schemas/BorrowRequest' }
    BorrowRequestListPayload:
      type: object
      required: [borrowRequests]
      properties:
        borrowRequests:
          type: array
          items: { $ref: '#/components/schemas/BorrowRequest' }
    MemberBorrowingsPayload:
      type: object
      required: [borrowings, pagination]
      properties:
        borrowings:
          type: array
          items: { $ref: '#/components/schemas/BorrowDetail' }
        pagination: { $ref: '#/components/schemas/AuditLogPagination' }
    BorrowRequestPayload:
      type: object
      required: [borrowRequest]
      properties:
        borrowRequest: { $ref: '#/components/schemas/BorrowRequest' }
    BorrowDetailReturnPayload:
      type: object
      required: [borrowDetail, fineCandidate]
      properties:
        borrowDetail: { $ref: '#/components/schemas/BorrowDetail' }
        fineCandidate: { $ref: '#/components/schemas/FineCandidate' }
    BorrowDetailPayload:
      type: object
      required: [borrowDetail]
      properties:
        borrowDetail: { $ref: '#/components/schemas/BorrowDetail' }
    BorrowingReport:
      type: object
      additionalProperties: false
      required: [metrics, rows, page, limit, totalRows]
      properties:
        metrics:
          type: object
          additionalProperties: false
          required: [activeLoans, overdueLoans, borrowCountByPeriod, topBorrowedBooks]
          properties:
            activeLoans: { type: integer, minimum: 0 }
            overdueLoans: { type: integer, minimum: 0 }
            borrowCountByPeriod:
              type: object
              additionalProperties: { type: integer, minimum: 0 }
            topBorrowedBooks:
              type: array
              maxItems: 10
              items:
                type: object
                additionalProperties: false
                required: [bookId, title, borrowCount]
                properties:
                  bookId: { type: integer }
                  title: { type: string, nullable: true }
                  borrowCount: { type: integer, minimum: 0 }
        rows:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [borrowDetailId, requestId, userId, bookId, copyId, status, borrowDate, dueDate, returnDate]
            properties:
              borrowDetailId: { type: integer, minimum: 1 }
              requestId: { type: integer, minimum: 1 }
              userId: { type: integer, minimum: 1 }
              bookId: { type: integer, minimum: 1, nullable: true }
              copyId: { type: integer, minimum: 1 }
              status: { type: string, enum: [REQUESTED, BORROWED, RETURNED, LOST, DAMAGED, OVERDUE, UNKNOWN] }
              borrowDate: { type: string, format: date, nullable: true }
              dueDate: { type: string, format: date, nullable: true }
              returnDate: { type: string, format: date, nullable: true }
        page: { type: integer, minimum: 1 }
        limit: { type: integer, minimum: 1, maximum: 100 }
        totalRows: { type: integer, minimum: 0 }
    InventoryReport:
      type: object
      additionalProperties: false
      required: [metrics, rows, page, limit, totalRows]
      properties:
        metrics:
          type: object
          additionalProperties: false
          required: [totalBooks, totalCopies, copiesByStatus, lowStockBooks]
          properties:
            totalBooks: { type: integer, minimum: 0 }
            totalCopies: { type: integer, minimum: 0 }
            copiesByStatus:
              type: object
              additionalProperties: { type: integer, minimum: 0 }
            lowStockBooks:
              type: array
              items:
                type: object
                additionalProperties: false
                required: [bookId, title, effectiveAvailability]
                properties:
                  bookId: { type: integer }
                  title: { type: string, nullable: true }
                  effectiveAvailability: { type: integer, minimum: 0 }
        rows:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [bookId, title, copyId, barcode, location, status, effectiveAvailability]
            properties:
              bookId: { type: integer }
              title: { type: string, nullable: true }
              copyId: { type: integer }
              barcode: { type: string, nullable: true }
              location: { type: string, nullable: true }
              status: { type: string, enum: [AVAILABLE, BORROWED, RESERVED, DAMAGED, LOST, INACTIVE, UNKNOWN] }
              effectiveAvailability: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        limit: { type: integer, minimum: 1, maximum: 100 }
        totalRows: { type: integer, minimum: 0 }
    UserStatisticsReport:
      type: object
      additionalProperties: false
      required: [metrics, rows, page, limit, totalRows]
      properties:
        metrics:
          type: object
          additionalProperties: false
          required: [totalMembers, usersByStatus, usersByRole, membershipByStatus, newMembersByPeriod]
          properties:
            totalMembers: { type: integer, minimum: 0 }
            usersByStatus:
              type: object
              additionalProperties: { type: integer, minimum: 0 }
            usersByRole:
              type: object
              additionalProperties: { type: integer, minimum: 0 }
            membershipByStatus:
              type: object
              additionalProperties: { type: integer, minimum: 0 }
            newMembersByPeriod:
              type: object
              additionalProperties: { type: integer, minimum: 0 }
        rows:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [userId, status, roles, membershipStatus, createdAt, approvedAt]
            properties:
              userId: { type: integer, minimum: 1 }
              status: { type: string, enum: [ACTIVE, INACTIVE, LOCKED, UNKNOWN] }
              roles:
                type: array
                items: { type: string, enum: [ADMIN, LIBRARIAN, MEMBER, GUEST, UNKNOWN] }
              membershipStatus: { type: string, enum: [PENDING, APPROVED, REJECTED, INACTIVE, UNKNOWN], nullable: true }
              createdAt: { type: string, format: date-time, nullable: true }
              approvedAt: { type: string, format: date-time, nullable: true }
        page: { type: integer, minimum: 1 }
        limit: { type: integer, minimum: 1, maximum: 100 }
        totalRows: { type: integer, minimum: 0 }
    Fine:
      type: object
      additionalProperties: false
      required: [fineId, userId, borrowDetailId, overdueDays, ratePerDay, amount, paidAmount, reason, status]
      properties:
        fineId: { type: integer, minimum: 1 }
        userId: { type: integer, minimum: 1 }
        borrowDetailId: { type: integer, minimum: 1 }
        overdueDays: { type: integer, minimum: 0 }
        ratePerDay: { type: number, minimum: 0 }
        amount: { type: number, exclusiveMinimum: 0 }
        paidAmount: { type: number, minimum: 0 }
        reason: { type: string, enum: [OVERDUE] }
        status: { type: string, enum: [UNPAID, PAID, WAIVED, CANCELLED] }
        paidAt: { type: string, format: date-time, nullable: true }
        collectedBy: { type: integer, minimum: 1, nullable: true }
        paymentMethod: { type: string, minLength: 1, maxLength: 50, nullable: true }
        calculatedAt: { type: string, format: date-time }
        member: { type: object, nullable: true }
        bookTitle: { type: string, nullable: true }
        barcode: { type: string, nullable: true }
    FineListPayload:
      type: object
      additionalProperties: false
      required: [fines, page, limit, total, totalPages]
      properties:
        fines:
          type: array
          items: { $ref: '#/components/schemas/Fine' }
        page: { type: integer, minimum: 1 }
        limit: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    FineMutationPayload:
      type: object
      additionalProperties: false
      required: [fine]
      properties:
        fine: { $ref: '#/components/schemas/Fine' }
    FinePaymentInput:
      type: object
      additionalProperties: false
      required: [paymentMethod]
      properties:
        paymentMethod: { type: string, minLength: 1, maxLength: 50 }
        note: { type: string, maxLength: 500 }
    FineResolutionInput:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason: { type: string, minLength: 1, maxLength: 500 }
    Book:
      type: object
      additionalProperties: false
      required: [id, title, category, author, availabilityStatus]
      properties:
        id: { type: integer, minimum: 1 }
        title: { type: string }
        isbn: { type: string, maxLength: 20 }
        category: { type: string }
        author: { type: string }
        publisher: { type: string }
        year: { type: integer, nullable: true }
        description: { type: string }
        cover: { type: string }
        rating: { type: number, minimum: 0, maximum: 5, multipleOf: 0.1 }
        pages: { type: integer, minimum: 0, maximum: 10000 }
        available: { type: boolean }
        availabilityStatus: { type: string, enum: [AVAILABLE, UNAVAILABLE] }
        totalCopies: { type: integer, minimum: 0 }
        availableCopies: { type: integer, minimum: 0 }
        categoryId: { type: integer, nullable: true, minimum: 1 }
        authorId: { type: integer, nullable: true, minimum: 1 }
        publisherId: { type: integer, nullable: true, minimum: 1 }
        status: { type: string, enum: [ACTIVE, INACTIVE] }
        version: { type: string, description: Opaque SQL rowversion token }
        createdAt: { type: string, format: date-time, nullable: true }
        updatedAt: { type: string, format: date-time, nullable: true }
    BookPagination:
      type: object
      additionalProperties: false
      required: [page, limit, total, totalPages]
      properties:
        page: { type: integer, minimum: 1 }
        limit: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    PublicBookSummary:
      type: object
      additionalProperties: false
      required: [bookId, title, availabilityStatus]
      properties:
        bookId: { type: integer, minimum: 1 }
        title: { type: string }
        isbn: { type: string, maxLength: 20, nullable: true }
        categoryName: { type: string, nullable: true }
        authorName: { type: string, nullable: true }
        publisherName: { type: string, nullable: true }
        publishYear: { type: integer, nullable: true }
        description: { type: string, nullable: true }
        coverUrl: { type: string, nullable: true }
        availabilityStatus: { type: string, enum: [AVAILABLE, UNAVAILABLE] }
    PublicBookListResponse:
      type: object
      additionalProperties: false
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/PublicBookSummary' }
        pagination: { $ref: '#/components/schemas/BookPagination' }
    PublicBookResponse:
      type: object
      additionalProperties: false
      required: [book]
      properties:
        book: { $ref: '#/components/schemas/PublicBookSummary' }
    BookListResponse:
      type: object
      additionalProperties: false
      required: [items, pagination]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Book' }
        pagination: { $ref: '#/components/schemas/BookPagination' }
    BookResponse:
      type: object
      additionalProperties: false
      required: [book]
      properties:
        book: { $ref: '#/components/schemas/Book' }
    BookInput:
      type: object
      additionalProperties: false
      required: [title, categoryId, authorId]
      properties:
        title: { type: string, minLength: 1, maxLength: 255 }
        isbn: { type: string, maxLength: 20 }
        categoryId: { type: integer, minimum: 1 }
        authorId: { type: integer, minimum: 1 }
        publisherId: { type: integer, nullable: true, minimum: 1 }
        publishYear: { type: integer, nullable: true, minimum: 1 }
        pages: { type: integer, nullable: true, minimum: 1, maximum: 10000 }
        rating: { type: number, minimum: 0, maximum: 5, multipleOf: 0.1 }
        coverUrl: { type: string, maxLength: 255 }
        description: { type: string, maxLength: 2000 }
    BookMultipartInput:
      type: object
      additionalProperties: false
      required: [metadata]
      properties:
        metadata:
          type: string
          description: JSON-serialized BookInput object
        cover:
          type: string
          format: binary
          description: Optional JPG, PNG, or WebP image up to 2 MB
    BookStatusInput:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason: { type: string, minLength: 1, maxLength: 500 }
security:
  - bearerAuth: []
paths:
  /api/books:
    get:
      tags: [Book Management]
      summary: Search active public books (FR-FE05-001/002/009/010)
      security: []
      parameters:
        - { name: q, in: query, required: false, schema: { type: string, maxLength: 200 } }
        - { name: categoryId, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: authorId, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: publisherId, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: page, in: query, required: false, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        '200': { description: Active public catalog page, content: { application/json: { schema: { $ref: '#/components/schemas/PublicBookListResponse' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
    post:
      tags: [Book Management]
      summary: Create a book with an optional managed cover upload (FR-FE05-006/027/028)
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: '#/components/schemas/BookInput' } }
          multipart/form-data: { schema: { $ref: '#/components/schemas/BookMultipartInput' } }
      responses:
        '201': { description: Created book, content: { application/json: { schema: { $ref: '#/components/schemas/BookResponse' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/admin/books:
    get:
      tags: [Book Management]
      summary: List books for librarians/admins (FR-FE05-004/009/010)
      parameters:
        - { name: q, in: query, required: false, schema: { type: string, minLength: 1, maxLength: 200 } }
        - { name: status, in: query, required: false, schema: { type: string, enum: [ACTIVE, INACTIVE] } }
        - { name: categoryId, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: page, in: query, required: false, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: sort, in: query, required: false, schema: { type: string, enum: [title, publishYear, createdAt], default: title } }
        - { name: order, in: query, required: false, schema: { type: string, enum: [asc, desc], default: asc } }
      responses:
        '200': { description: Staff catalog page, content: { application/json: { schema: { $ref: '#/components/schemas/BookListResponse' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '400': { $ref: '#/components/responses/ValidationError' }
  /api/admin/requests:
    get:
      tags: [Admin Requests]
      summary: List FE07 borrow requests for the FE11 Admin request-management view (FR-FE11-034)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, required: false, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: q, in: query, required: false, schema: { type: string, minLength: 1, maxLength: 100 } }
        - { name: status, in: query, required: false, schema: { type: string, enum: [PENDING, APPROVED, REJECTED, COMPLETED, CANCELLED] } }
        - { name: from, in: query, required: false, schema: { type: string, format: date } }
        - { name: to, in: query, required: false, schema: { type: string, format: date } }
      responses:
        '200':
          description: Canonical paginated Admin request list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminRequestListResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/admin/requests/{requestId}:
    get:
      tags: [Admin Requests]
      summary: Read one authoritative FE07 borrow request through the FE11 safe projection (FR-FE11-034)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: requestId, in: path, required: true, schema: { type: integer, minimum: 1 } }
      responses:
        '200':
          description: Canonical safe Admin request detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminRequestDetail' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/books/metadata:
    get:
      tags: [Book Management]
      summary: Read book metadata options (FR-FE05-005/013)
      responses:
        '200': { description: Categories, authors, and publishers }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/books/{bookId}:
    get:
      tags: [Book Management]
      summary: View a book detail (FR-FE05-003/014/019/020)
      security: []
      parameters:
        - { name: bookId, in: path, required: true, schema: { type: integer, minimum: 1 } }
      responses:
        '200': { description: Public-safe active book detail, content: { application/json: { schema: { $ref: '#/components/schemas/PublicBookResponse' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Book Management]
      summary: Update book metadata with optimistic concurrency (FR-FE05-007/016/023)
      parameters:
        - { name: bookId, in: path, required: true, schema: { type: integer, minimum: 1 } }
        - { name: If-Match, in: header, required: true, schema: { type: string }, description: Last-seen opaque rowversion token }
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: '#/components/schemas/BookInput' } }
          multipart/form-data: { schema: { $ref: '#/components/schemas/BookMultipartInput' } }
      responses:
        '200': { description: Updated book, content: { application/json: { schema: { $ref: '#/components/schemas/BookResponse' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/books/{bookId}/deactivate:
    patch:
      tags: [Book Management]
      summary: Deactivate a book without mutating copies (FR-FE05-008/019/023/025)
      parameters:
        - { name: bookId, in: path, required: true, schema: { type: integer, minimum: 1 } }
        - { name: If-Match, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: '#/components/schemas/BookStatusInput' } }
      responses:
        '200': { description: Inactive book, content: { application/json: { schema: { $ref: '#/components/schemas/BookResponse' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/books/{bookId}/reactivate:
    patch:
      tags: [Book Management]
      summary: Reactivate a book without mutating copies (FR-FE05-022/023/025)
      parameters:
        - { name: bookId, in: path, required: true, schema: { type: integer, minimum: 1 } }
        - { name: If-Match, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: '#/components/schemas/BookStatusInput' } }
      responses:
        '200': { description: Active book, content: { application/json: { schema: { $ref: '#/components/schemas/BookResponse' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/admin/permissions:
    get:
      tags: [Admin Permissions]
      summary: Read the canonical FE11 Phase 1 permission matrix (FR-FE11-032)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Canonical read-only roles and permission policy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminPermissionsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/admin/audit-logs:
    get:
      tags: [Admin Audit]
      summary: Search and filter redacted cross-feature audit logs (FR-FE11-033)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, required: false, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: q, in: query, required: false, schema: { type: string, minLength: 1, maxLength: 100 } }
        - { name: action, in: query, required: false, schema: { type: string, minLength: 1, maxLength: 100 } }
        - { name: actorId, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: from, in: query, required: false, schema: { type: string, format: date } }
        - { name: to, in: query, required: false, schema: { type: string, format: date } }
      responses:
        '200':
          description: Redacted audit-log page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditLogListResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/borrow-requests:
    post:
      tags: [Borrowing]
      summary: Member creates a borrow request (FR-FE07-001/002)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BorrowRequestCreateInput' }
      responses:
        '201': { $ref: '#/components/responses/BorrowRequestCreatedResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: >
            Borrowing conflict. RESERVATION_QUEUE_PRIORITY means staff must process the active
            reservation queue first. RESERVATION_STATE_CONFLICT means the held-copy state no
            longer matches a requester-owned notified reservation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SafeError' }
    get:
      tags: [Borrowing]
      summary: Librarian/Admin lists borrow requests (FR-FE07-011)
      parameters:
        - { name: status, in: query, required: false, schema: { type: string, enum: [PENDING, APPROVED, REJECTED, COMPLETED, CANCELLED] } }
        - { name: memberId, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: fromDate, in: query, required: false, schema: { type: string, format: date } }
        - { name: toDate, in: query, required: false, schema: { type: string, format: date } }
      responses:
        '200': { $ref: '#/components/responses/BorrowRequestListResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/borrow-requests/me:
    get:
      tags: [Borrowing]
      summary: Member views own borrowing history (FR-FE07-010)
      parameters:
        - { name: status, in: query, required: false, schema: { type: string, enum: [REQUESTED, BORROWED, RETURNED, LOST, DAMAGED, OVERDUE], description: OVERDUE is derived from a past-due BORROWED detail. } }
        - { name: fromDate, in: query, required: false, schema: { type: string, format: date } }
        - { name: toDate, in: query, required: false, schema: { type: string, format: date } }
        - { name: page, in: query, required: false, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        '200': { $ref: '#/components/responses/MemberBorrowingsResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/members/{memberId}/borrowings:
    get:
      tags: [Borrowing]
      summary: Librarian/Admin views a member's borrowings (FR-FE07-011)
      parameters:
        - { name: memberId, in: path, required: true, schema: { type: integer, minimum: 1 } }
        - { name: status, in: query, required: false, schema: { type: string, enum: [REQUESTED, BORROWED, RETURNED, LOST, DAMAGED, OVERDUE], description: OVERDUE is derived from a past-due BORROWED detail. } }
        - { name: fromDate, in: query, required: false, schema: { type: string, format: date } }
        - { name: toDate, in: query, required: false, schema: { type: string, format: date } }
        - { name: page, in: query, required: false, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        '200': { $ref: '#/components/responses/MemberBorrowingsResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/borrow-requests/{requestId}/approve:
    patch:
      tags: [Borrowing]
      summary: Approve a borrow request (FR-FE07-004/005)
      parameters:
        - { name: requestId, in: path, required: true, schema: { type: integer, minimum: 1 } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BorrowRequestApproveInput' }
      responses:
        '200': { $ref: '#/components/responses/BorrowRequestResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: >
            Approval conflict. RESERVATION_QUEUE_PRIORITY means the active queue still owns
            priority. RESERVATION_STATE_CONFLICT means the held reservation changed during
            approval and the transaction made no changes.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SafeError' }
  /api/borrow-requests/{requestId}/reject:
    patch:
      tags: [Borrowing]
      summary: Reject a borrow request (FR-FE07-006)
      parameters:
        - { name: requestId, in: path, required: true, schema: { type: integer, minimum: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BorrowRequestRejectInput' }
      responses:
        '200': { $ref: '#/components/responses/BorrowRequestResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/borrow-details/{borrowDetailId}/return:
    patch:
      tags: [Borrowing]
      summary: Process a return (FR-FE07-007/008/013)
      parameters:
        - { name: borrowDetailId, in: path, required: true, schema: { type: integer, minimum: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BorrowDetailReturnInput' }
      responses:
        '200': { $ref: '#/components/responses/BorrowDetailReturnResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/borrow-details/{borrowDetailId}/renew:
    patch:
      tags: [Borrowing]
      summary: Renew a borrowed copy once (FR-FE07-009/020)
      parameters:
        - { name: borrowDetailId, in: path, required: true, schema: { type: integer, minimum: 1 } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BorrowDetailRenewInput' }
      responses:
        '200': { $ref: '#/components/responses/BorrowDetailResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/reservations:
    post:
      tags: [Reservation]
      summary: Member reserves a copy (FR-FE08-001/002/003)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [copyId]
              properties:
                copyId: { type: integer }
      responses:
        '201': { description: Reservation created (ACTIVE) }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    get:
      tags: [Reservation]
      summary: Librarian/Admin lists reservations (FR-FE08-005)
      parameters:
        - { name: status, in: query, required: false, schema: { type: string, enum: [ACTIVE, NOTIFIED, FULFILLED, CANCELLED, EXPIRED] } }
        - { name: bookId, in: query, required: false, schema: { type: integer } }
        - { name: memberId, in: query, required: false, schema: { type: integer } }
      responses:
        '200': { description: List of reservations }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/reservations/candidates:
    get:
      tags: [Reservation]
      summary: Member lists safe physical-copy reservation candidates (FR-FE08-029)
      description: Member-only read path. Returns active-book BORROWED/RESERVED copies without barcode, location, owner, email, timestamps, or version metadata.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: q, in: query, required: false, schema: { type: string, maxLength: 200 } }
        - { name: page, in: query, required: false, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        '200':
          description: Paginated member-safe reservation candidate catalog
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReservationCandidateListResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/reservations/me:
    get:
      tags: [Reservation]
      summary: Member views own reservations (FR-FE08-010)
      responses:
        '200': { description: Caller's reservations }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/reservations/process-queue:
    post:
      tags: [Reservation]
      summary: Process the queue for an available copy → hold + notify (FR-FE08-006/007/008)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [copyId]
              properties:
                copyId: { type: integer }
      responses:
        '200':
          description: Next eligible reservation held (NOTIFIED), no eligible reservation, or a safe notification-audit warning
          content:
            application/json:
              schema:
                type: object
                required: [selectedReservation]
                properties:
                  selectedReservation:
                    type: object
                    nullable: true
                  message: { type: string }
                  notificationWarning:
                    type: object
                    additionalProperties: false
                    required: [code, message]
                    properties:
                      code:
                        type: string
                        enum: [RESERVATION_NOTIFY_AUDIT_FAILED]
                      message: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/reservations/expire-holds:
    post:
      tags: [Reservation]
      summary: Expire overdue holds, promote next members, and surface safe warnings (FR-FE08-019/021)
      responses:
        '200':
          description: Expired count, expired/promoted reservations, and optional safe promotion warnings
          content:
            application/json:
              schema:
                type: object
                required: [expiredCount, expired, promoted]
                properties:
                  expiredCount: { type: integer, minimum: 0 }
                  expired:
                    type: array
                    items: { type: object }
                  promoted:
                    type: array
                    items: { type: object }
                  notificationWarnings:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      required: [reservationId, copyId, code, message]
                      properties:
                        reservationId: { type: integer, minimum: 1 }
                        copyId: { type: integer, minimum: 1 }
                        code:
                          type: string
                          enum: [RESERVATION_NOTIFY_AUDIT_FAILED]
                        message: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/reservations/{reservationId}/cancel:
    patch:
      tags: [Reservation]
      summary: Member cancels own reservation (FR-FE08-004)
      parameters:
        - { name: reservationId, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Reservation cancelled }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/notifications/requests:
    post:
      tags: [Notification]
      summary: Create a non-sensitive staff notification request (FR-FE10-003..005)
      description: >
        Librarian/Admin HTTP boundary for non-sensitive notification types only.
        Sensitive authentication notifications must be requested internally through the FE02- or
        FE11-bound requester. Membership results must be requested through the FE04-bound requester.
        HTTP callers cannot provide sourceFeature.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [type, templateKey]
              properties:
                type:
                  type: string
                  enum: [RESERVATION_AVAILABLE, DUE_DATE_REMINDER, OVERDUE_NOTICE, FINE_NOTICE]
                channel: { type: string, enum: [EMAIL] }
                userId: { type: integer, minimum: 1 }
                recipientEmail: { type: string, format: email }
                templateKey: { type: string }
                templateData: { type: object }
                sourceEntityType: { type: string }
                sourceEntityId:
                  type: integer
                  minimum: 1
                  description: Positive JSON integer only; strings and decimals are rejected.
                idempotencyKey: { type: string }
      responses:
        '201':
          description: New notification accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationSummary' }
        '200':
          description: Idempotent replay of an existing notification
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationSummary' }
        '400':
          description: Invalid request, including SOURCE_FEATURE_HTTP_FORBIDDEN when sourceFeature is supplied.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SafeError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Sensitive authentication types return SENSITIVE_NOTIFICATION_INTERNAL_ONLY.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SafeError' }
  /api/notifications/process-pending:
    post:
      tags: [Notification]
      summary: Process pending notifications (FR-FE10-006/007)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: Delivery processing summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProcessPendingSummary' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/notifications/{id}/retry:
    post:
      tags: [Notification]
      summary: Return one failed queued notification to PENDING (FR-FE10-007/009)
      description: Librarian/Admin only. Sensitive authentication notifications must be reissued from their source event.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, minimum: 1, maximum: 2147483647 }
      responses:
        '200':
          description: Failed non-sensitive notification returned to PENDING without delivery.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationSummary' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Only failed queued notifications can be retried. Sensitive FAILED records return REISSUE_REQUIRED with `Create a new notification from the source event.` PROCESSING records return DELIVERY_STATE_UNCERTAIN because delivery may already have occurred.
  /api/reports/borrowing:
    get:
      tags: [Reporting]
      summary: Borrowing report (FR-FE12-001)
      description: Detailed rows use BorrowDate DESC, BorrowDetailId DESC.
      parameters:
        - { name: q, in: query, required: false, schema: { type: string, maxLength: 200 } }
        - { name: fromDate, in: query, required: false, schema: { type: string, format: date } }
        - { name: toDate, in: query, required: false, schema: { type: string, format: date } }
        - { name: status, in: query, required: false, schema: { type: string, enum: [PENDING, APPROVED, REJECTED, COMPLETED, CANCELLED, REQUESTED, BORROWED, RETURNED, LOST, DAMAGED, OVERDUE] } }
        - { name: bookId, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: userId, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: page, in: query, required: false, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        '200': { $ref: '#/components/responses/BorrowingReportResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/reports/inventory:
    get:
      tags: [Reporting]
      summary: Inventory report (FR-FE12-002)
      description: Detailed rows use Title ASC, BookId ASC, CopyId ASC.
      parameters:
        - { name: q, in: query, required: false, schema: { type: string, maxLength: 200 } }
        - { name: categoryId, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: bookId, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: status, in: query, required: false, schema: { type: string, enum: [AVAILABLE, BORROWED, RESERVED, DAMAGED, LOST, INACTIVE] } }
        - { name: location, in: query, required: false, schema: { type: string, maxLength: 100 } }
        - { name: page, in: query, required: false, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        '200': { $ref: '#/components/responses/InventoryReportResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/reports/users:
    get:
      tags: [Reporting]
      summary: User statistics report (FR-FE12-003/008)
      description: Detailed rows use UserId ASC and exclude personal profile fields.
      parameters:
        - { name: q, in: query, required: false, schema: { type: string, maxLength: 200 } }
        - { name: fromDate, in: query, required: false, schema: { type: string, format: date } }
        - { name: toDate, in: query, required: false, schema: { type: string, format: date } }
        - { name: roleId, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: status, in: query, required: false, schema: { type: string, enum: [ACTIVE, INACTIVE, LOCKED] } }
        - { name: membershipStatus, in: query, required: false, schema: { type: string, enum: [PENDING, APPROVED, REJECTED, INACTIVE] } }
        - { name: page, in: query, required: false, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        '200': { $ref: '#/components/responses/UserStatisticsReportResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/fines/me:
    get:
      tags: [Fine Management]
      summary: List the authenticated member's fines (FE09)
      parameters:
        - { name: status, in: query, required: false, schema: { type: string, enum: [UNPAID, PAID, WAIVED, CANCELLED] } }
        - { name: page, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        '200':
          description: Own fines with deterministic pagination
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FineListPayload' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/fines:
    get:
      tags: [Fine Management]
      summary: List fines for staff (FE09)
      description: Librarian/Admin only. Results are always ordered by FineId ASC.
      parameters:
        - { name: q, in: query, required: false, schema: { type: string, maxLength: 200 } }
        - { name: userId, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: status, in: query, required: false, schema: { type: string, enum: [UNPAID, PAID, WAIVED, CANCELLED] } }
        - { name: page, in: query, required: false, schema: { type: integer, minimum: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        '200':
          description: FineId ASC list with deterministic pagination
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FineListPayload' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/fines/{fineId}:
    get:
      tags: [Fine Management]
      summary: Read one fine for its owner or staff (FE09)
      parameters:
        - { name: fineId, in: path, required: true, schema: { type: integer, minimum: 1 } }
      responses:
        '200':
          description: Fine detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FineMutationPayload' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/fines/calculate:
    post:
      tags: [Fine Management]
      summary: Calculate an overdue fine from stored borrowing dates (FE09)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [borrowDetailId]
              properties:
                borrowDetailId: { type: integer, minimum: 1 }
      responses:
        '200': { description: Existing or non-overdue calculation result }
        '201': { description: Newly created fine calculation }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/fines/{fineId}/collections:
    post:
      tags: [Fine Management]
      summary: Record one full offline collection (FE09)
      requestBody:
        required: true
        content:
          application/json:
            schema:
