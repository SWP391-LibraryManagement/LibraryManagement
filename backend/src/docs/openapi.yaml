              additionalProperties: false
              required: [paymentMethod]
              properties:
                paymentMethod: { type: string, minLength: 1, maxLength: 50 }
                note: { type: string, maxLength: 500 }
      parameters:
        - { name: fineId, in: path, required: true, schema: { type: integer, minimum: 1 } }
      responses:
        '200':
          description: Fine resolved as PAID with full payment metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FineMutationPayload' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/fines/{fineId}/paid:
