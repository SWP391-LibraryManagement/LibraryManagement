        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/fines/{fineId}/waive:
    patch:
      tags: [Fine Management]
      summary: Waive an unpaid fine as Admin (FE09)
      parameters:
        - { name: fineId, in: path, required: true, schema: { type: integer, minimum: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FineResolutionInput' }
      responses:
        '200':
          description: Fine resolved as WAIVED
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FineMutationPayload' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/fines/{fineId}/cancel:
    patch:
      tags: [Fine Management]
      summary: Cancel an unpaid fine as Admin (FE09)
