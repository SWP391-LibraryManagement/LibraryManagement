name: Deploy staging

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: library-staging
  cancel-in-progress: false

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Enforce traceability
        run: npm run trace:enforce

      - name: Backend coverage gate
        run: npm run test:coverage:ci
        working-directory: backend

      - name: System integration gate
        run: npm run test:integration:system
        working-directory: backend

      - name: Frontend tests
        run: npm test
        working-directory: frontend

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Frontend staging build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.STAGING_API_URL }}/api

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: System browser E2E
        run: npm run test:e2e

      - name: Deployment utility tests
        run: npm run test:deployment

  deploy-backend:
    needs: quality-gate
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_API_URL }}
    steps:
      - uses: actions/checkout@v7

      - name: Prepare backend deployment package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force deploy/backend | Out-Null
          Copy-Item backend/package.json,backend/package-lock.json deploy/backend/
          Copy-Item backend/src deploy/backend/src -Recurse

      - name: Deploy backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy/backend

  deploy-frontend:
    needs: quality-gate
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_FRONTEND_URL }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build staging frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.STAGING_API_URL }}/api

      - name: Deploy frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ''
          skip_app_build: true

  smoke-test:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_FRONTEND_URL }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Verify staging endpoints
        run: npm run smoke:staging
        env:
          STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
