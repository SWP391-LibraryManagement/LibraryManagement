name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
  workflow_dispatch:

jobs:
  foundation-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Spec traceability gate (FR @spec coverage >= 70% for implemented features)
        run: npm run trace:enforce

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Backend tests
        run: npm test
        working-directory: backend

      - name: System integration tests
        run: npm run test:integration:system
        working-directory: backend

      - name: Backend coverage threshold
        run: npm run test:coverage:ci
        working-directory: backend

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Frontend tests
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: System browser E2E
        run: npm run test:e2e

      - name: Backend health import check
        run: node -e "const app = require('./src/index'); if (!app || typeof app.listen !== 'function') throw new Error('Express app export is invalid');"
        working-directory: backend
