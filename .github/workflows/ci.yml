name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  foundation-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Spec traceability report (FR @spec coverage)
        run: node scripts/check-traceability.js

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Backend tests
        run: npm test
        working-directory: backend

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Backend health import check
        run: node -e "const app = require('./src/index'); if (!app || typeof app.listen !== 'function') throw new Error('Express app export is invalid');"
        working-directory: backend
